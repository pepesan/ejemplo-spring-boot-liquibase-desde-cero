spring:
    application:
        name: ejemplo-spring-boot-liquibase-desde-cero
    datasource:
        url: jdbc:h2:file:./data/migracion-demo
        driver-class-name: org.h2.Driver
        username: sa
        password:
    h2:
        console:
            # Consola H2 accesible en http://localhost:8080/h2-console
            enabled: true
            path: /h2-console
    jpa:
        hibernate:
            # Hibernate solo valida; Liquibase es quien crea el esquema
            ddl-auto: validate

    liquibase:
        change-log: classpath:db/changelog/db.changelog-master.yaml
